<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>llmouser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="chrome">
      <div id="toolbar">
        <div id="nav-buttons">
          <button
            id="back-button"
            data-testid="back-button"
            type="button"
            class="toolbar-button"
            title="Show the previous page"
            aria-label="Back"
            disabled
          >
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                d="M10.5 3 5.5 8l5 5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            id="forward-button"
            data-testid="forward-button"
            type="button"
            class="toolbar-button"
            title="Show the next page"
            aria-label="Forward"
            disabled
          >
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                d="M5.5 3l5 5-5 5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <form id="address-form" autocomplete="off">
          <input
            id="address-bar"
            data-testid="address-bar"
            type="text"
            placeholder="Search or enter website name"
            aria-label="Address bar"
          />
          <button id="go-button" data-testid="go-button" type="submit" title="Go" aria-label="Go">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                d="M3 8h9M8.5 4.5 12 8l-3.5 3.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </form>
        <div id="toolbar-actions">
          <button
            id="settings-button"
            data-testid="settings-button"
            type="button"
            class="toolbar-button"
            title="Settings"
            aria-label="Settings"
          >
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"
                fill="currentColor"
              />
              <path
                d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </div>
      <div id="tab-bar" data-testid="tab-bar">
        <button id="new-tab-button" data-testid="new-tab-button" type="button" title="New tab">
          +
        </button>
      </div>
    </header>

    <section id="settings-panel" data-testid="settings-panel" hidden>
      <h2>LLM Settings</h2>
      <form id="settings-form">
        <label>
          Provider
          <select id="settings-provider" data-testid="settings-provider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
          </select>
        </label>
        <label>
          Endpoint
          <input id="settings-endpoint" data-testid="settings-endpoint" type="text" />
        </label>
        <label>
          Model
          <input id="settings-model" data-testid="settings-model" type="text" />
        </label>
        <label>
          API Key
          <input id="settings-apikey" data-testid="settings-apikey" type="password" />
        </label>
        <label>
          Max output tokens
          <input id="settings-maxtokens" data-testid="settings-maxtokens" type="number" min="1" />
        </label>
        <label>
          Universe rules
          <textarea
            id="settings-universe"
            data-testid="settings-universe"
            rows="3"
            placeholder="Describe the universe all websites exist in"
          ></textarea>
        </label>
        <div class="settings-actions">
          <button type="submit" data-testid="settings-save">Save</button>
          <button type="button" id="settings-close" data-testid="settings-close">Close</button>
        </div>
      </form>
    </section>

    <!-- Site iframes are created per tab by main.ts. -->
    <main id="viewport"></main>

    <div id="status" data-testid="status" role="status"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
